name: Setup pnpm + Node
description:
  Composite action that pins pnpm via the action-setup, configures Node from .nvmrc with pnpm
  caching, and installs deps with --frozen-lockfile. Used by every workflow in this repo to remove
  ~12 lines of repetition.

inputs:
  install:
    description:
      When 'true' (the default), runs `pnpm install --frozen-lockfile` after Node setup. Set to
      'false' for jobs that only need the toolchain (e.g. release-images uses Buildx and doesn't
      need a Node tree).
    required: false
    default: "true"
  cache-turbo:
    description: When 'true', also restores the local `.turbo` cache via actions/cache.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Cache Turborepo local artifacts
      if: inputs.cache-turbo == 'true'
      uses: actions/cache@v4
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
