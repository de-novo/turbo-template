name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_OPTIONS: --max-old-space-size=4096
  TURBO_TELEMETRY_DISABLED: "1"
  # Uncomment + set repo secrets to enable Turborepo remote cache.
  # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  # TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  check:
    name: Check + Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node
        with:
          cache-turbo: "true"

      - name: Audit dependencies (gate on high+critical)
        run: pnpm audit --prod --audit-level=high

      - name: Check production licenses (allow-list)
        run: pnpm licenses:check

      - name: Syncpack lint (catalog drift)
        run: pnpm syncpack:check

      - name: Verification gate (lint, tsconfig, typecheck, format, env, design)
        run: pnpm check

      - name: Build
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node
        with:
          cache-turbo: "true"

      - name: Run tests
        run: pnpm test
