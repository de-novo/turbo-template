name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (gate on high+critical)
        run: pnpm audit --prod --audit-level=high

      - name: Check production licenses (allow-list)
        run: pnpm licenses:check

      - name: Check (lint + typecheck)
        run: pnpm check

      - name: Validate env examples
        run: pnpm env:check

      - name: Test
        run: pnpm test

      - name: Test (rename-template self-tests)
        run: pnpm test:scripts

      - name: Build
        run: pnpm build
