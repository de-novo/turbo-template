# Local-dev Postgres for `pnpm dev:api`. Not a production stack.
#
#   pnpm dev:db        # starts postgres in the background
#   pnpm dev:db:logs   # tail logs
#   pnpm dev:db:stop   # stop the container (data persists in the volume)
#   pnpm dev:db:reset  # destructive: stop + drop the data volume
#
# DATABASE_URL for apps/api matches the credentials below — see
# env/local/api.env.example. Do NOT use these credentials in production.

services:
  postgres:
    image: postgres:17-alpine
    container_name: turbo-template-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fullstack_template
    ports:
      # Map host:5433 → container:5432 so the dev stack coexists with any
      # other Postgres container or system service already on host 5432.
      - "5433:5432"
    volumes:
      - turbo-template-postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fullstack_template"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  turbo-template-postgres-dev-data:
    name: turbo-template-postgres-dev-data
