services:
  postgres:
    image: postgres:17-alpine
    container_name: fullstack-template-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fullstack_template
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fullstack_template"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
