# Local-prod sanity orchestration. Real production should target an
# upstream orchestrator (k8s, Fly, Render, etc.) — see docs/deployment.md.
#
# Build context for both app images is the repo root.
#
# Run with:  docker compose -f docker-compose.prod.yml up --build
# Tear down: docker compose -f docker-compose.prod.yml down -v

services:
  postgres:
    image: postgres:17-alpine
    container_name: ${PROJECT_SLUG:-fullstack-typescript-template}-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fullstack_template}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fullstack_template}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: ${PROJECT_SLUG:-fullstack-typescript-template}-api:${TAG:-local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      PROJECT_NAME: ${PROJECT_NAME:-Fullstack TypeScript Template}
      PROJECT_SLUG: ${PROJECT_SLUG:-fullstack-typescript-template}
      PROJECT_TIMEZONE: ${PROJECT_TIMEZONE:-Asia/Seoul}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fullstack_template}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET (>=32 chars)}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:4000/docs || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    image: ${PROJECT_SLUG:-fullstack-typescript-template}-web:${TAG:-local}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      PROJECT_NAME: ${PROJECT_NAME:-Fullstack TypeScript Template}
      PROJECT_SLUG: ${PROJECT_SLUG:-fullstack-typescript-template}
      PROJECT_TIMEZONE: ${PROJECT_TIMEZONE:-Asia/Seoul}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
